<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声録音システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
            color: #333;
        }
        #status-container {
            text-align: center;
        }
        /* カウントダウンの数字デザイン */
        #countdown {
            font-size: 80px;
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }
        /* 録音中アニメーション（波紋のような表現） */
        .recording-pulse {
            width: 120px;
            height: 120px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            animation: pulse 1.5s infinite;
            margin: 0 auto 20px;
        }
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 59, 48, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }
        #message {
            font-size: 20px;
            font-weight: 500;
        }
        /* 停止ボタン */
        #stop-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: none; /* 録音開始時に表示 */
        }
    </style>
</head>
<body>

<div id="status-container">
    <div id="visual-element">
        <div id="countdown">3</div>
    </div>
    <div id="message">まもなく録音を開始します...</div>
    <button id="stop-btn">録音を停止して保存</button>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const countdownEl = document.getElementById('countdown');
    const visualElement = document.getElementById('visual-element');
    const messageEl = document.getElementById('message');
    const stopBtn = document.getElementById('stop-btn');

    // ページ読み込み完了と同時にマイク権限を要求してカウントダウン開始
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            // 先にマイクの許可を取得（これがないと自動録音がブラウザにブロックされるため）
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                
                // 1. BlobをBase64文字列に変換する
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    const base64Audio = reader.result.split(',')[1]; // ヘッダーを除いた純粋なデータ
                    // 2. AppSheet APIへPOST送信
                    const appId = "4685a6dd-5910-4de7-a436-024d5a82245c";
                    const apiKey = "V2-ksToy-jx4wi-NkFlf-ZpAOj-sPzWh-pRPz4-indeA-sGcV6";
                    const tableName = "AudioRecords"; // ※スプレッドシートのタブ名（AppSheet上のテーブル名）

                    // 2. AppSheet APIへPOST送信
                    try {
                        const response = await fetch("https://api.appsheet.com/api/v2/apps/${appId}/tables/AudioRecords/Action", {
                            method: "POST",
                            headers: {
                                "ApplicationAccessKey": apiKey,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                "Action": "Add",
                                "Properties": { "Locale": "ja-JP", "Timezone": "Tokyo Standard Time" },
                                "Rows": [
                                    {
                                        "ID": crypto.randomUUID(), 
                                        "タイトル": "自動録音テスト", 
                                        "音声ファイル": base64Audio,
                                        "日時": new Date().toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" })
                                    }
                                ]
                            })
                        });
                        
                        if (response.ok) {
                            alert("録音データを送信しました！");
                        }
                    } catch (error) {
                        console.error("AppSheetへの送信エラー:", error);
                    }
                };
            };

            // カウントダウン処理の実行
            runCountdown(() => {
                startRecording();
            });

        } catch (err) {
            console.error("マイクのアクセス拒否、または未対応ブラウザ:", err);
            countdownEl.style.display = 'none';
            messageEl.innerText = "エラー: マイクの利用を許可してください。";
        }
    });

    // カウントダウンロジック
    function runCountdown(callback) {
        let count = 3;
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.innerText = count;
            } else if (count === 0) {
                countdownEl.innerText = "START";
                countdownEl.style.color = "#34c759"; // 緑色に
            } else {
                clearInterval(interval);
                callback(); // カウントダウン終了後に録音開始
            }
        }, 1000);
    }

    // 録音開始時のUI変更と処理
    function startRecording() {
        mediaRecorder.start();
        
        // UIを「録音中」のアニメーションに切り替え
        visualElement.innerHTML = '<div class="recording-pulse">REC</div>';
        messageEl.innerText = "録音中...";
        messageEl.style.color = "#ff3b30";
        
        // 停止ボタンを表示
        stopBtn.style.display = "inline-block";
    }

    // 停止ボタンのイベント
    stopBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            messageEl.innerText = "録音を停止しました。";
            messageEl.style.color = "#333";
            stopBtn.style.display = "none";
            visualElement.innerHTML = "";
        }
    });
</script>

</body>
</html>
