<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声録音システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
            color: #333;
        }
        #status-container {
            text-align: center;
        }
        /* カウントダウンの数字デザイン */
        #countdown {
            font-size: 80px;
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }
        /* 録音中アニメーション（波紋のような表現） */
        .recording-pulse {
            width: 120px;
            height: 120px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            animation: pulse 1.5s infinite;
            margin: 0 auto 20px;
        }
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 59, 48, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }
        #message {
            font-size: 20px;
            font-weight: 500;
        }
        /* 停止ボタン */
        #stop-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: none; /* 録音開始時に表示 */
        }
    </style>
</head>
<body>

<div id="setup-container" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa;">
    <h3 style="margin-top: 0;">📋 インタビュー対象者情報</h3>
    <div style="margin-bottom: 10px;">
        <label for="candidate-email" style="display: block; font-weight: bold; margin-bottom: 5px;">候補者メールアドレス（連絡先）:</label>
        <input type="email" id="candidate-email" placeholder="example@gmail.com" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;" required>
    </div>
    <button id="start-btn" style="width: 100%; padding: 10px; background-color: #0078d4; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
        面談（録音）を開始する
    </button>
</div>
<div id="status-container" style="display: none;">
    <div id="visual-element">
        <div id="countdown">3</div>
    </div>
    <div id="message">まもなく録音を開始します...</div>
    <button id="stop-btn">録音を停止して保存</button>
</div>
<!-- 文字起こし結果の表示エリア（前回提示したものと同じ） -->
<div id="result-container" style="display: none; margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; background: #f9f9f9;">
    <h3>🎙️ 文字起こし結果</h3>
    <p><strong>インタビュー対象者ID:</strong> <span id="res-candidate-id" style="font-family: monospace; font-weight: bold;">-</span></p>
    <p><strong>対象者メールアドレス:</strong> <span id="res-candidate-email">-</span></p>
    <p><strong>ファイル名:</strong> <span id="res-filename">-</span></p>
    <p><strong>録音時間:</strong> <span id="res-duration">-</span></p>
    <p><strong>文字数:</strong> <span id="res-length">0</span> 文字</p>
    <div id="res-text-box" style="margin: 10px 0; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 4px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.5;">
        ここに結果が表示されます...
    </div>
    <p><a id="res-file-link" href="#" target="_blank" style="color: #0078d4; text-decoration: underline; font-weight: bold;">📁 録音ファイルをダウンロード</a></p>
</div>

<script>
    // 録音時間を計測するための変数（グローバルまたは録音開始処理の中に配置）
    let startTime;
    let durationText = "0秒";
    let mediaRecorder;
    let audioChunks = [];
    const countdownEl = document.getElementById('countdown');
    const visualElement = document.getElementById('visual-element');
    const messageEl = document.getElementById('message');
    const stopBtn = document.getElementById('stop-btn');
    // 録音開始時に時間を記録する
    function startTimer() {
        startTime = Date.now();
    }
    // 録音停止時に時間を計算する
    function stopTimer() {
        const durationMs = Date.now() - startTime;
        const seconds = Math.floor(durationMs / 1000);
        if (seconds < 60) {
            durationText = `${seconds}秒`;
        } else {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            durationText = `${minutes}分${remainingSeconds}秒`;
        }
    }
    // AppSheetのレコードをポーリングして文字起こし結果を監視する関数
    async function pollForTranscription(recordId, fileName) {
        const appId = "4685a6dd-5910-4de7-a436-024d5a82245c"; 
        const apiKey = "V2-ksToy-jx4wi-NkFlf-ZpAOj-sPzWh-pRPz4-indeA-sGcV6";
        const tableName = "AudioRecords";
        
        const messageEl = document.getElementById("message");
        messageEl.innerText = "音声送信完了。文字起こし処理を待っています...";

        // 5秒おきに最大24回（計2分間）確認する
        const maxAttempts = 24;
        const intervalMs = 5000;

        for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            try {
                // AppSheetから特定のレコードを取得するためのFindリクエスト
                const response = await fetch(`https://api.appsheet.com/api/v2/apps/${appId}/tables/${tableName}/Action`, {
                    method: "POST",
                    headers: {
                        "ApplicationAccessKey": apiKey,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "Action": "Find",
                        "Properties": { "Locale": "ja-JP", "Timezone": "Tokyo Standard Time" },
                        "Rows": [{ "ID": recordId }]
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        const record = data[0];
                        
                        // 「文字おこし結果」カラム（AppSheet側の実際の列名に合わせてください）
                        const text = record["文字おこし結果"]; 
                        
                        // 文字起こしテキストが更新されたか、ステータスが完了になった場合
                        if (text && text.trim() !== "" && text !== "処理中") {
                            // 画面に反映
                            document.getElementById("res-filename").innerText = fileName;
                            document.getElementById("res-duration").innerText = durationText;
                            document.getElementById("res-length").innerText = text.length;
                            document.getElementById("res-text-box").innerText = text.substring(0, 1000); // 1000文字制限
                            
                            // ファイルリンクの設定（AppSheetのファイル保存先URL構造に合わせる）
                            // ※通常はGoogleドライブの共有リンクにするか、AppSheetの画像・ファイルダウンロードURLを指定
                            const fileLink = document.getElementById("res-file-link");
                            fileLink.href = `https://www.appsheet.com/template/gettablefileurl?appName=${appId}&tableName=${tableName}&fileName=${record["音声ファイル"]}`;

                            // コンテナを表示
                            document.getElementById("result-container").style.display = "block";
                            messageEl.innerText = "文字起こしが完了しました！";
                            return; // 終了
                        }
                    }
                }
                else
                {
                    const result = await response.json();
                    alert("文字おこし結果(" + response.ok + "): " + JSON.stringify(result));
                }
            } catch (error) {
                console.error("ポーリングエラー:", error);
            }
            
            // 次の確認まで待機
            await new Promise(resolve => setTimeout(resolve, intervalMs));
            messageEl.innerText = `文字起こしを待っています... (${attempt * 5}秒経過)`;
        }

        messageEl.innerText = "時間切れ：文字起こしの確認をタイムアウトしました。AppSheet側で直接確認してください。";
    }
    // 【追加】一意の「インタビュー対象者ID」を生成する関数
    function generateCandidateId() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const randomChars = Math.random().toString(36).substring(2, 6).toUpperCase();
        return `CAND-${yyyy}${mm}${dd}-${randomChars}`;
    }
    window.addEventListener('DOMContentLoaded', () => {
        const startBtn = document.getElementById("start-btn");
        // 開始ボタンが押された時の処理
        startBtn.addEventListener("click", async () => { // asyncを追加
            const emailInput = document.getElementById("candidate-email");
            const email = emailInput.value.trim();
            
            if (!email || !email.includes("@")) {
                alert("有効な候補者のメールアドレスを入力してください。");
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                mediaRecorder.onstop = async () => {
                    stopTimer();
                    // フォームからメールアドレスを取得
                    const emailInput = document.getElementById("candidate-email");
                    const candidateEmail = emailInput.value.trim();
                    if (!candidateEmail) {
                        alert("エラー: 候補者のメールアドレスを入力してから録音を終了してください。");
                        return;
                    }
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64AudioWithPrefix = reader.result;
                        const base64DataOnly = base64AudioWithPrefix.split(',')[1];
                        const appId = "4685a6dd-5910-4de7-a436-024d5a82245c";
                        const apiKey = "V2-ksToy-jx4wi-NkFlf-ZpAOj-sPzWh-pRPz4-indeA-sGcV6";
                        const tableName = "AudioRecords"; // ※スプレッドシートのタブ名（AppSheet上のテーブル名）
                        const currentRecordId = crypto.randomUUID();
                        const fileName = `audio_${Date.now()}.wav`;
                        const candidateId = generateCandidateId();
                        const fileDataForAppSheet = `${fileName},${base64AudioWithPrefix}`;
                        const requestUrl = "https://api.appsheet.com/api/v2/apps/" + appId + "/tables/" + tableName + "/Action";
                        try {
                            const response = await fetch(requestUrl, {
                                method: "POST",
                                headers: {
                                    "ApplicationAccessKey": apiKey,
                                    "Content-Type": "application/json"
                                },
                                body: JSON.stringify({
                                    "Action": "Add",
                                    "Properties": { "Locale": "ja-JP", "Timezone": "Tokyo Standard Time" },
                                    "Rows": [
                                        {
                                            "ID": currentRecordId, 
                                            "タイトル": `面談録音_${candidateId}`, 
                                            "音声ファイル": fileName,
                                            "日時": new Date().toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" }),
                                            "インタビュー対象者ID": candidateId,
                                            "対象者メールアドレス": candidateEmail, 
                                            "ステータス": "選考中",
                                            "インタビュアーメールアドレス一覧": "tetsuro.takao@processtune.com, interviewer2@example.com",
                                            "関係者メールアドレス一覧": ""
                                        }
                                    ]
                                })
                            });
                            // for debug ##TODO delete
                            // const result = await response.json();
                            // alert(requestUrl + "送信結果(" + response.ok + "): " + JSON.stringify(result));
                            // end ##TODO delete
                            if (response.ok) {
                                alert("送信に成功しました！ドライブへの保存と文字起こしを開始します。");
                                messageEl.innerText = "音声ファイルを送信中...";
                                messageEl.style.color = "#0078d4"; // 処理中っぽい青色などに
                                const gasUrl = "https://script.google.com/macros/s/AKfycbwZ89epDVn0UdJABmkZ-Bj09KpSUwGacz0KnvTAW-WSKNaaAVvZ2Lt0jyKGy9NjGNmdfA/exec";

                                const formData = new URLSearchParams();
                                formData.append("action", "saveAudio");
                                formData.append("base64Data", base64DataOnly);
                                formData.append("title", fileName);
                                try {
                                    const gasResponse = await fetch(gasUrl, {
                                        method: "POST",
                                        mode: "no-cors",
                                        headers: {
                                            // "Content-Type": "text/plain"
                                            "Content-Type": "application/x-www-form-urlencoded"
                                        },
                                        body: formData
                                        // body: JSON.stringify({
                                        //     action: "saveAudio",
                                        //     base64Data: base64DataOnly,
                                        //     title: fileName
                                        // })
                                    });
                                    if (gasResponse.ok) {
                                        console.log("GAS側での保存に成功");
                                        messageEl.innerText = "ファイルを保存しました！文字起こしを開始します...";
                                        document.getElementById("res-candidate-id").innerText = candidateId;
                                        document.getElementById("res-candidate-email").innerText = candidateEmail;
                                        pollForTranscription(currentRecordId, fileName);
                                    } else {
                                        // for debug ##TODO delete
                                        const result = await response.json();
                                        console.error("gasResponse(" + gasResponse.ok + "): " + JSON.stringify(result));
                                        // end ##TODO delete
                                        console.error("GASサーバー側でエラーが発生しました");
                                        messageEl.innerText = "ファイルの保存に失敗しました。";
                                    }
                                } catch (error) {
                                    console.error("GASへの送信エラー:", error);
                                    messageEl.innerText = "GASへの通信エラーが発生しました。";
                                }
                            }
                        } catch (error) {
                            console.error("AppSheetへの送信エラー:", error);
                            messageEl.innerText = "AppSheetへの通信エラーが発生しました。";
                        } finally {
                            audioChunks = []; 
                        }
                    };
                };
                // 画面の切り替え
                document.getElementById("setup-container").style.display = "none";
                document.getElementById("status-container").style.display = "block";
                // カウントダウンと録音開始へ
                initiateCountdownAndRecord();
            } catch (err) {
                alert("マイクの初期化に失敗しました: " + err.message);
                console.error("マイクのアクセス拒否、または未対応ブラウザ:", err);
                const countdownEl = document.getElementById("countdown");
                const messageEl = document.getElementById("message");
                if (countdownEl) countdownEl.style.display = 'none';
                if (messageEl) messageEl.innerText = "エラー: マイクの利用を許可してください。";
            }
        });
    });
    function startRecording() {
        startTimer();
        mediaRecorder.start();
        
        // UIを「録音中」のアニメーションに切り替え
        visualElement.innerHTML = '<div class="recording-pulse">REC</div>';
        messageEl.innerText = "録音中...";
        messageEl.style.color = "#ff3b30";
        
        // 停止ボタンを表示
        stopBtn.style.display = "inline-block";
    }
    // 停止ボタンのイベント
    stopBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            messageEl.innerText = "録音を停止しました。";
            messageEl.style.color = "#333";
            stopBtn.style.display = "none";
            visualElement.innerHTML = "";
        }
    });
    // カウントダウンと録音開始の処理（既存の自動開始コードを関数にまとめたもの）
    function initiateCountdownAndRecord() {
        let count = 3;
        const countdownEl = document.getElementById("countdown");
        const messageEl = document.getElementById("message");
        
        countdownEl.innerText = count;
        
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.innerText = count;
            } else {
                clearInterval(interval);
                countdownEl.style.display = "none";
                messageEl.innerText = "🔴 録音中...";
                // 録音開始の実装関数を呼ぶ
                startRecording(); 
            }
        }, 1000);
    }
</script>

</body>
</html>
